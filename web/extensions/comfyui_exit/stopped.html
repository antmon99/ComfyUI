<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ComfyUI — Stopped</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 12px;
      padding: 48px 56px;
      max-width: 440px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 24px;
      background: #2a1a1a;
      border: 1px solid #5a2a2a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 28px;
      height: 28px;
      stroke: #c0392b;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 14px;
      color: #777;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .divider {
      height: 1px;
      background: #2e2e2e;
      margin-bottom: 28px;
    }

    .instruction {
      font-size: 13px;
      color: #888;
      margin-bottom: 16px;
    }

    .cmd {
      display: inline-block;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px 20px;
      font-family: "Cascadia Code", "Consolas", monospace;
      font-size: 14px;
      color: #7ec8e3;
      letter-spacing: 0.3px;
    }

    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <path d="M18.36 6.64A9 9 0 1 1 5.64 5.64"/>
        <line x1="12" y1="2" x2="12" y2="12"/>
      </svg>
    </div>

    <h1>ComfyUI has stopped</h1>
    <p class="subtitle">The server has shut down cleanly.<br/>To restart, run the launcher again.</p>

    <div class="divider"></div>

    <p class="instruction">Run from your terminal or shortcut:</p>
    <span class="cmd">launch.bat</span>

    <p class="footer">ComfyUI &mdash; Local AI Image Generation</p>
  </div>
  <script>
    fetch("/shutdown", { method: "POST" }).catch(() => {});
  </script>
</body>
</html>
